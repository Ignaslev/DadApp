<!DOCTYPE html><html lang="lt"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Prisijungimas — Tekila IVS</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:'Manrope',system-ui,sans-serif;background:#f5f7f5;color:#27302d;display:grid;place-items:center}.wrap{width:100%;max-width:410px;padding:24px}.logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:24px}.mark{width:46px;height:46px;border-radius:14px;background:#35887d;color:#fff;display:grid;place-items:center;font-weight:800;font-size:22px;box-shadow:0 10px 30px rgba(53,136,125,.22)}.name{font-weight:800;font-size:20px}.sub{font-size:12px;color:#747f7a}.card{background:#fff;border:1px solid #e1e6e2;border-radius:18px;padding:26px;box-shadow:0 18px 48px rgba(18,32,28,.08)}h1{font-size:20px;margin:0 0 18px}.field{margin-bottom:14px}.field label{display:block;font-size:12px;font-weight:800;color:#747f7a;margin-bottom:6px}.field input{width:100%;border:1px solid #e1e6e2;border-radius:12px;padding:12px 13px;font:inherit}.field input:focus{outline:none;border-color:#35887d;box-shadow:0 0 0 3px rgba(53,136,125,.12)}button{width:100%;border:0;border-radius:12px;background:#35887d;color:#fff;font:inherit;font-weight:800;padding:12px;cursor:pointer}.error{background:#fde6e2;color:#9e302a;border:1px solid #f3c0bb;border-radius:12px;padding:11px;margin-bottom:14px;font-size:13px}.footer{text-align:center;margin-top:18px;color:#9aa39f;font-size:12px}</style></head><body><div class="wrap"><div class="logo"><div class="mark">T</div><div><div class="name">Tekila IVS</div><div class="sub">Inventoriaus valdymo sistema</div></div></div><div class="card"><h1>Prisijungimas</h1>{% if form.errors %}<div class="error">Neteisingas vartotojo vardas arba slaptažodis.</div>{% endif %}<form method="post">{% csrf_token %}<div class="field"><label>Vartotojo vardas</label><input type="text" name="username" autofocus autocomplete="username"></div><div class="field"><label>Slaptažodis</label><input type="password" name="password" autocomplete="current-password"></div><input type="hidden" name="next" value="{{ next }}"><button type="submit">Prisijungti</button></form></div><div class="footer">Tekila IVS — Inventoriaus valdymo sistema</div></div></body></html>
